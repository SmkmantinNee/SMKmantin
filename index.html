<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK Mantin - 创世管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0118;
            --primary-purple: #7d3cf2;
            --god-gold: #ffd700;
            --error-red: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans SC', sans-serif; }
        body { background-color: var(--bg-color); color: white; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .phone-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; position: relative; border: 1px solid #333; background: #000; }

        /* 创世模式顶部提示 */
        #creatorHeader { background: var(--god-gold); color: black; text-align: center; font-size: 12px; padding: 5px; font-weight: bold; display: none; }

        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); }
        .logo { font-weight: bold; font-size: 20px; cursor: pointer; color: var(--primary-purple); }

        /* 列表区域 */
        .chat-list { flex: 1; padding: 15px; overflow-y: auto; }
        .user-card { 
            display: flex; align-items: center; background: #161616; 
            margin-bottom: 12px; padding: 15px; border-radius: 12px; 
            cursor: pointer; border: 1px solid #222;
        }
        
        .avatar { width: 45px; height: 45px; background: #333; border-radius: 50%; margin-right: 15px; transition: 0.3s; }
        
        /* 神管理头像特效 */
        .god-effect { border: 2px solid var(--god-gold); box-shadow: 0 0 15px var(--primary-purple); animation: breathe 2s infinite; }
        @keyframes breathe { 0% { opacity: 0.8; } 50% { opacity: 1; box-shadow: 0 0 20px var(--god-gold); } 100% { opacity: 0.8; } }

        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold; }
        .badge-god { background: var(--god-gold); color: black; }

        /* 管理面板 */
        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; }
        .admin-modal { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #1a1a1a; border: 1px solid #333; padding: 25px; border-radius: 20px; z-index: 101; width: 85%;
        }
        .action-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

        /* 底部导航 */
        .nav-bar { display: grid; grid-template-columns: repeat(6, 1fr); background: #0a0a0a; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { text-align: center; font-size: 10px; color: #555; }
        .active { color: var(--primary-purple); font-weight: bold; }
    </style>
</head>
<body>

<div class="phone-container">
    <div id="creatorHeader">MASTER CONTROL ACTIVATED</div>

    <div class="top-bar">
        <span class="logo" onclick="checkMasterKey()">SMK <span style="color:#00e5ff">mantin</span></span>
        <select id="langSelect" onchange="updateLang()" style="background:#222; color:white; border:none; padding:5px; border-radius:10px;">
            <option value="zh">中文</option>
            <option value="ms">Melayu</option>
            <option value="en">English</option>
            <option value="ta">தமிழ்</option>
        </select>
    </div>

    <div style="text-align:center; padding:15px;"><h2 id="txt-title" style="border: 1px dashed #444; display:inline-block; padding:5px 20px; border-radius:15px; font-size:18px;">聊天室</h2></div>

    <div class="chat-list" id="userList"></div>

    <nav class="nav-bar">
        <div class="nav-item active" id="nav1">聊天室</div>
        <div class="nav-item" id="nav2">学习区</div>
        <div class="nav-item" id="nav3">视频</div>
        <div class="nav-item" id="nav4">游戏</div>
        <div class="nav-item" id="nav5">私/群</div>
        <div class="nav-item" id="nav6">个人</div>
    </nav>

    <div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
    <div class="admin-modal" id="adminModal">
        <h3 id="targetName" style="text-align:center; margin-bottom:20px;">用户管理</h3>
        <button class="action-btn" style="background:#000; color:var(--god-gold); border:1px solid #444;">🛡️ <span id="btn-spy">监控私信记录</span></button>
        <button id="toggleBtn" class="action-btn" onclick="handleToggle()"></button>
        <button class="action-btn" style="background:var(--error-red); color:white;" onclick="handleBan()" id="btn-ban">永久封禁</button>
        <button class="action-btn" style="background:#333; color:white;" onclick="closeModal()" id="btn-back">返回</button>
    </div>
</div>

<script>
    const MY_KEY = "nzl122909"; // 你的新密码
    let isMaster = false;
    let selectedIdx = null;

    let users = [
        { name: "超级管理员 (你)", isGod: true, id: "001" },
        { name: "Student_Mantin_A", isGod: false, id: "882" },
        { name: "Student_Mantin_B", isGod: false, id: "774" }
    ];

    const langMap = {
        zh: { title:"聊天室", admin:"神管理员", promote:"赋予神管理权限", demote:"取消神管理权限", spy:"监控私信记录", ban:"永久封禁", back:"返回", nav:["聊天室","学习区","视频","游戏","私/群","个人"] },
        ms: { title:"Bilik Sembang", admin:"God Admin", promote:"Beri Kuasa God Admin", demote:"Tarik Balik Kuasa", spy:"Pantau Mesej", ban:"Ban Selamanya", back:"Kembali", nav:["Sembang","Belajar","Video","Game","Privat","Profil"] },
        en: { title:"Chat Room", admin:"God Admin", promote:"Grant God Admin", demote:"Revoke Admin Status", spy:"Monitor Messages", ban:"Permanent Ban", back:"Back", nav:["Chat","Study","Video","Game","Group","Profile"] },
        ta: { title:"அரட்டை அறை", admin:"நிர்வாகி", promote:"அதிகாரம் வழங்கு", demote:"அதிகாரத்தை நீக்கு", spy:"செய்திகளைப் பார்", ban:"தடை செய்", back:"திரும்பிச் செல்", nav:["அரட்டை","படிப்பு","வீடியோ","ஆட்டம்","குழு","சுயவிவரம்"] }
    };

    function updateLang() {
        const l = langMap[document.getElementById('langSelect').value];
        document.getElementById('txt-title').innerText = l.title;
        document.getElementById('btn-spy').innerText = l.spy;
        document.getElementById('btn-ban').innerText = l.ban;
        document.getElementById('btn-back').innerText = l.back;
        for(let i=1; i<=6; i++) document.getElementById('nav'+i).innerText = l.nav[i-1];
        render();
    }

    function render() {
        const list = document.getElementById('userList');
        const l = langMap[document.getElementById('langSelect').value];
        list.innerHTML = '';
        users.forEach((u, i) => {
            const card = document.createElement('div');
            card.className = 'user-card';
            card.onclick = () => openAdmin(i);
            card.innerHTML = `
                <div class="avatar ${u.isGod ? 'god-effect' : ''}"></div>
                <div>
                    <strong>${u.name}</strong> ${u.isGod ? `<span class="badge badge-god">${l.admin}</span>` : ''}
                    <p style="font-size:12px; color:#555;">UID: ${u.id}</p>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function checkMasterKey() {
        if(prompt("请输入创世密码：") === MY_KEY) {
            isMaster = true;
            document.getElementById('creatorHeader').style.display = 'block';
            alert("身份验证成功，欢迎主人！");
        }
    }

    function openAdmin(i) {
        if(!isMaster) return alert("普通用户无权操作。");
        selectedIdx = i;
        const u = users[i];
        const l = langMap[document.getElementById('langSelect').value];
        document.getElementById('targetName').innerText = u.name;
        const tBtn = document.getElementById('toggleBtn');
        tBtn.innerText = u.isGod ? l.demote : l.promote;
        tBtn.style.background = u.isGod ? "#ff8800" : "#00d4ff";
        document.getElementById('adminModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function handleToggle() {
        users[selectedIdx].isGod = !users[selectedIdx].isGod;
        render();
        closeModal();
    }

    function handleBan() {
        if(confirm("确定封锁该学生？")) {
            users.splice(selectedIdx, 1);
            render();
            closeModal();
        }
    }

    function closeModal() {
        document.getElementById('adminModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    updateLang();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMKmantin 登录</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:390px;
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    position:relative;
}

.setting{
    position:absolute;
    top:15px;
    right:15px;
    font-size:22px;
}

.top-bar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:10px;
}

.language-select{
    padding:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    font-size:42px;
    color:#111827;
}

.logo p{
    color:#666;
    margin-top:8px;
}

.input-group{
    margin-bottom:16px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#f1f1f1;
    font-size:15px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

.login-btn{
    background:#111827;
    color:white;
}

.login-btn:hover{
    background:#374151;
}

.register-btn{
    background:#e5e7eb;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#888;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<div class="setting">⚙️</div>

<div class="top-bar">
<select class="language-select" onchange="changeLanguage(this.value)">
<option value="zh">中文</option>
<option value="ms">Bahasa Melayu</option>
<option value="ta">தமிழ்</option>
<option value="en">English</option>
</select>
</div>

<div class="logo">
<h1>SMKmantin</h1>
<p id="welcomeText">
欢迎回来
</p>
</div>

<form id="loginForm">

<div class="input-group">
<label id="accountLabel">账号:</label>
<input
type="text"
id="accountInput"
placeholder="请输入账号"
required>
</div>

<div class="input-group">
<label id="passwordLabel">密码:</label>
<input
type="password"
id="passwordInput"
placeholder="请输入密码"
required>
</div>

<button
type="submit"
class="btn login-btn"
id="loginBtn">
登录
</button>

<button
type="button"
class="btn register-btn"
id="registerBtn"
onclick="location.href='register.html'">
注册新账号
</button>

</form>

<div class="footer">
SMKmantin © 2026
</div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", function(event){

event.preventDefault();

alert("登录成功！");

window.location.href = "home.html";

});

const translations = {

zh:{
welcome:"欢迎回来",
account:"账号:",
accountPlaceholder:"请输入账号",
password:"密码:",
passwordPlaceholder:"请输入密码",
login:"登录",
register:"注册新账号"
},

ms:{
welcome:"Selamat Datang Kembali",
account:"Akaun:",
accountPlaceholder:"Masukkan akaun",
password:"Kata Laluan:",
passwordPlaceholder:"Masukkan kata laluan",
login:"Log Masuk",
register:"Daftar Akaun Baru"
},

ta:{
welcome:"மீண்டும் வரவேற்கிறோம்",
account:"கணக்கு:",
accountPlaceholder:"கணக்கை உள்ளிடவும்",
password:"கடவுச்சொல்:",
passwordPlaceholder:"கடவுச்சொல்லை உள்ளிடவும்",
login:"உள்நுழை",
register:"புதிய கணக்கு பதிவு"
},

en:{
welcome:"Welcome Back",
account:"Account:",
accountPlaceholder:"Enter account",
password:"Password:",
passwordPlaceholder:"Enter password",
login:"Login",
register:"Create New Account"
}

};

function changeLanguage(lang){

document.getElementById("welcomeText").innerText =
translations[lang].welcome;

document.getElementById("accountLabel").innerText =
translations[lang].account;

document.getElementById("accountInput").placeholder =
translations[lang].accountPlaceholder;

document.getElementById("passwordLabel").innerText =
translations[lang].password;

document.getElementById("passwordInput").placeholder =
translations[lang].passwordPlaceholder;

document.getElementById("loginBtn").innerText =
translations[lang].login;

document.getElementById("registerBtn").innerText =
translations[lang].register;

}

</script>

</body>
</html>

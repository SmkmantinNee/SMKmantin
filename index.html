<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK Mantin Platform</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-card { height: 500px; background: #1a1a1a; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; margin-bottom: 15px; }
        .nav-btn { flex: 1; text-align: center; padding: 12px; font-size: 12px; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const dictionary = {
            zh: { v: "视频区", c: "聊天", s: "语音", m: "我的", search: "搜索...", join: "进入房间" },
            ms: { v: "Video", c: "Sembang", s: "Suara", m: "Profil", search: "Cari...", join: "Sertai" },
            ta: { v: "வீடியோ", c: "அரட்டை", s: "குரல்", m: "சுயவிவரம்", search: "தேடல்...", join: "சேர" },
            en: { v: "Videos", c: "Chat", s: "Voice", m: "Me", search: "Search...", join: "Join Room" }
        };
        function App() {
            const [lang, setLang] = useState('zh');
            const [page, setPage] = useState('v');
            const [dark, setDark] = useState(false);
            const t = (k) => dictionary[lang][k];
            return (
                <div className={`max-w-md mx-auto h-screen flex flex-col ${dark ? 'bg-black text-white' : 'bg-gray-50 text-gray-800'}`}>
                    <div className="flex items-center gap-2 p-3 bg-white shadow-sm sticky top-0 z-10">
                        <input className="flex-1 p-2 bg-gray-100 rounded-xl text-sm" placeholder={t('search')} />
                        <button onClick={() => setDark(!dark)} className="text-xl"> {dark ? '☀️' : '🌙'} </button>
                        <select value={lang} onChange={(e)=>setLang(e.target.value)} className="text-xs border rounded-md p-1 bg-white">
                            <option value="zh">中文</option>
                            <option value="ms">Melayu</option>
                            <option value="ta">தமிழ்</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4">
                        {page === 'v' && <div className="space-y-4"><div className="video-card">🎬 {t('v')} 1</div><div className="video-card">🎬 {t('v')} 2</div></div>}
                        {page === 'c' && <div className="text-center text-gray-400 mt-20">{t('c')} 系统正在维护...</div>}
                        {page === 's' && <div className="bg-white p-6 rounded-3xl shadow-lg text-center"><h2 className="font-bold text-lg mb-4">{t('s')} 101</h2><button className="bg-indigo-600 text-white px-8 py-2 rounded-full">{t('join')}</button></div>}
                        {page === 'm' && <div className="text-center mt-10"><div className="w-24 h-24 bg-indigo-100 rounded-full mx-auto mb-4 border-4 border-white shadow-md"></div><h3 className="font-bold text-xl text-indigo-600">SMK Mantin 学生</h3><p className="text-gray-500">5PSV1 班级</p></div>}
                    </div>
                    <div className="flex justify-around bg-white border-t p-2 pb-6">
                        <button onClick={()=>setPage('v')} className={`nav-btn ${page==='v'?'text-indigo-600 font-bold':''}`}><div>🎥</div>{t('v')}</button>
                        <button onClick={()=>setPage('c')} className={`nav-btn ${page==='c'?'text-indigo-600 font-bold':''}`}><div>💬</div>{t('c')}</button>
                        <button onClick={()=>setPage('s')} className={`nav-btn ${page==='s'?'text-indigo-600 font-bold':''}`}><div>📞</div>{t('s')}</button>
                        <button onClick={()=>setPage('m')} className={`nav-btn ${page==='m'?'text-indigo-600 font-bold':''}`}><div>👤</div>{t('m')}</button>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMKmantin 注册</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:390px;
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    position:relative;
}

.setting{
    position:absolute;
    top:15px;
    right:15px;
    font-size:22px;
}

.top-bar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:10px;
}

.language-select{
    padding:8px;
    border-radius:10px;
    border:1px solid #ccc;
    cursor:pointer;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    font-size:42px;
    color:#111827;
}

.logo p{
    color:#666;
    margin-top:8px;
    line-height:24px;
}

.input-group{
    margin-bottom:16px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#333;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#f1f1f1;
    font-size:15px;
}

.note{
    font-size:13px;
    color:#777;
    margin-top:5px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#111827;
    color:white;
    font-size:18px;
    margin-top:10px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#374151;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#888;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

    <div class="setting">⚙️</div>

    <div class="top-bar">
        <select class="language-select" onchange="changeLanguage(this.value)">
            <option value="zh">中文</option>
            <option value="ms">Bahasa Melayu</option>
            <option value="ta">தமிழ்</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="logo">
        <h1>SMKmantin</h1>
        <p id="titleText">账号注册</p>
    </div>

    <div class="input-group">
        <label id="accountLabel">账号:</label>
        <input type="text" id="accountInput" placeholder="不用学校的都可以">
    </div>

    <div class="input-group">
        <label id="nameLabel">姓名:</label>
        <input type="text" id="nameInput" placeholder="输入你的名字">
    </div>

    <div class="input-group">
        <label id="classLabel">班级:</label>
        <input type="text" id="classInput" placeholder="例如 4 Amanah">
    </div>

    <div class="input-group">
        <label id="birthdayLabel">生日日期:</label>
        <input type="date" id="birthdayInput">
    </div>

    <div class="input-group">
        <label id="idLabel">进入SMK的具体身份号码:</label>
        <input type="text" id="idInput" placeholder="例如 SMK12345">
        <div class="note" id="idNote">
            （从老师那里获得）
        </div>
    </div>

    <div class="input-group">
        <label id="phoneLabel">电话号码:</label>
        <input type="tel" id="phoneInput" placeholder="输入电话号码">
    </div>

    <button class="btn" id="registerBtn">
        注册
    </button>

    <div class="footer">
        SMKmantin © 2026
    </div>

</div>

<script>

const translations = {

    zh:{
        title:"账号注册",
        account:"账号:",
        accountPlaceholder:"不用学校的都可以",
        name:"姓名:",
        namePlaceholder:"输入你的名字",
        class:"班级:",
        classPlaceholder:"例如 4 Amanah",
        birthday:"生日日期:",
        id:"进入SMK的具体身份号码:",
        idPlaceholder:"例如 SMK12345",
        note:"（从老师那里获得）",
        phone:"电话号码:",
        phonePlaceholder:"输入电话号码",
        register:"注册"
    },

    ms:{
        title:"Pendaftaran Akaun",
        account:"Akaun:",
        accountPlaceholder:"Boleh guna akaun apa sahaja",
        name:"Nama:",
        namePlaceholder:"Masukkan nama anda",
        class:"Kelas:",
        classPlaceholder:"Contoh 4 Amanah",
        birthday:"Tarikh Lahir:",
        id:"Nombor identiti masuk SMK:",
        idPlaceholder:"Contoh SMK12345",
        note:"(Dapat daripada guru)",
        phone:"Nombor Telefon:",
        phonePlaceholder:"Masukkan nombor telefon",
        register:"Daftar"
    },

    ta:{
        title:"கணக்கு பதிவு",
        account:"கணக்கு:",
        accountPlaceholder:"எந்த கணக்கையும் பயன்படுத்தலாம்",
        name:"பெயர்:",
        namePlaceholder:"உங்கள் பெயரை உள்ளிடவும்",
        class:"வகுப்பு:",
        classPlaceholder:"உதாரணம் 4 Amanah",
        birthday:"பிறந்த தேதி:",
        id:"SMK அடையாள எண்:",
        idPlaceholder:"உதாரணம் SMK12345",
        note:"(ஆசிரியரிடமிருந்து பெறவும்)",
        phone:"தொலைபேசி எண்:",
        phonePlaceholder:"தொலைபேசி எண்ணை உள்ளிடவும்",
        register:"பதிவு"
    },

    en:{
        title:"Account Registration",
        account:"Account:",
        accountPlaceholder:"Any account can be used",
        name:"Name:",
        namePlaceholder:"Enter your name",
        class:"Class:",
        classPlaceholder:"Example 4 Amanah",
        birthday:"Birth Date:",
        id:"SMK Identity Number:",
        idPlaceholder:"Example SMK12345",
        note:"(Get from teacher)",
        phone:"Phone Number:",
        phonePlaceholder:"Enter phone number",
        register:"Register"
    }

};

function changeLanguage(lang){

    document.getElementById("titleText").innerText =
        translations[lang].title;

    document.getElementById("accountLabel").innerText =
        translations[lang].account;

    document.getElementById("accountInput").placeholder =
        translations[lang].accountPlaceholder;

    document.getElementById("nameLabel").innerText =
        translations[lang].name;

    document.getElementById("nameInput").placeholder =
        translations[lang].namePlaceholder;

    document.getElementById("classLabel").innerText =
        translations[lang].class;

    document.getElementById("classInput").placeholder =
        translations[lang].classPlaceholder;

    document.getElementById("birthdayLabel").innerText =
        translations[lang].birthday;

    document.getElementById("idLabel").innerText =
        translations[lang].id;

    document.getElementById("idInput").placeholder =
        translations[lang].idPlaceholder;

    document.getElementById("idNote").innerText =
        translations[lang].note;

    document.getElementById("phoneLabel").innerText =
        translations[lang].phone;

    document.getElementById("phoneInput").placeholder =
        translations[lang].phonePlaceholder;

    document.getElementById("registerBtn").innerText =
        translations[lang].register;
}

</script>

</body>
</html>
